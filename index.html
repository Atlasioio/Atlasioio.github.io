<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lukas Ahlse — product designer in Stockholm. UX/UI, interaction, motion, and brand for digital products. Previously a product designer at Sony Nimway." />
    <title>Lukas Ahlse — Product Designer</title>

    <!-- Fonts: Archivo (display) · Inter (body) · Geist Mono (labels). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&family=Caveat:wght@500;600;700&family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Apply the saved theme before paint to avoid a flash. First visit
         defaults to light (system preference is ignored). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('lukas-theme')
          if (t !== 'dark' && t !== 'light') t = 'light'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
